{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "httpbin.fullname" . }}
  labels:
    {{- include "httpbin.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "httpbin.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # allow inbound traffic from any pod in the cluster on the app port
    - ports:
        - port: {{ .Values.containerPort | default .Values.service.port }}
          protocol: TCP
  # DENY ALL
  egress: []
  #   # allow DNS resolution only; httpbin does not need outbound connections
  #   - ports:
  #       - port: 53
  #         protocol: UDP
  #       - port: 53
  #         protocol: TCP
{{- end }}
