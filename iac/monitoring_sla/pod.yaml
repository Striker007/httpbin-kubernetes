---
apiVersion: v1
kind: Pod
metadata:
  name: sla-monitor
  namespace: httpbin-production
  labels:
    app: sla-monitor
spec:
  restartPolicy: Always
  containers:
    - name: monitor
      image: python:3.12-slim
      command: ["python3", "/app/server.py"]
      env:
        - name: TRAEFIK_METRICS
          value: "http://traefik-metrics.kube-system.svc.cluster.local:9100/metrics"
        - name: SLA_SERVICE
          value: "httpbin"
        - name: REFRESH_INTERVAL
          value: "5"
        - name: PORT
          value: "8080"
      ports:
        - containerPort: 8080
          name: http
      volumeMounts:
        - name: app
          mountPath: /app
      resources:
        limits:
          cpu: 200m
          memory: 64Mi
        requests:
          cpu: 100m
          memory: 64Mi
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 65534
        capabilities:
          drop: ["ALL"]
  volumes:
    - name: app
      configMap:
        name: sla-check
        defaultMode: 0755

---
apiVersion: v1
kind: Service
metadata:
  name: sla-monitor
  namespace: httpbin-production
spec:
  selector:
    app: sla-monitor
  ports:
    - port: 80
      targetPort: http
  type: ClusterIP
